<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>✓ My Tasks</h1>
    </header>

    <div class="container">
        <div class="input-wrapper">
            <input type="text" id="input-value" placeholder="Add a new task...">
            <button id="add-btn">Add Task</button>
        </div>
        <div id="result"></div>
        <div id="empty-state" class="empty-state">No tasks yet. Add one to get started!</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
